<style>
    :root {
        /* Default Light Theme */
        --primary: #f8f9fa;       
        --dark-text: #1a202c;
        --accent: #38a169;
        --sidebar-width: 280px;
        --sidebar-min: 80px;
        --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        --bg-body: #f0f2f5;
        --bg-card: #ffffff;
        --text-main: #1a202c;
        --text-sub: #718096;
        --border-color: #e2e8f0;
    }

    /* DARK MODE SETTINGS */
    body.dark-mode {
        --bg-body: #121212;
        --bg-card: #1e1e1e;
        --primary: #1a1a1a;
        --text-main: #f7fafc;
        --text-sub: #a0aec0;
        --border-color: #2d3748;
        --dark-text: #f7fafc;
    }

    body, html {
        margin: 0; padding: 0;
        font-family: 'Inter', sans-serif;
        background-color: var(--bg-body);
        color: var(--text-main);
        transition: background 0.3s;
    
    }

    /* --- LAYOUT & CONTENT --- */
    .content { 
        margin-left: var(--sidebar-width); 
        padding: 25px 40px; 
        transition: var(--transition); 
    }
    .content.expanded { margin-left: var(--sidebar-min); }
     /* --- SEARCH BOX FIX --- */
.search-box { 
    padding: 10px 20px; 
    transition: var(--transition); 
    overflow: hidden; /* Para hindi lumampas ang text box */
}

.search-inner {
    background: rgba(0,0,0,0.05); /* Bagong dynamic gray background */
    border-radius: 10px;
    display: flex; 
    align-items: center; 
    padding: 12px;
    min-width: 40px; /* Sukat para sa icon */
}

.search-inner input {
    background: transparent; 
    border: none; 
    color: var(--text-main); 
    margin-left: 10px; 
    outline: none; 
    width: 100%;
    transition: var(--transition);
}

.search-inner i { 
    color: var(--text-sub); 
    min-width: 20px;
    text-align: center;
}

/* --- COLLAPSE LOGIC PARA SA SEARCH --- */
#sidebar.collapsed .search-box {
    cursor: pointer;
    padding: 10px 0 !important; /* Binawasan ang padding sa gilid para mag-center */
    display: flex;
    justify-content: center;
}

#sidebar.collapsed .search-inner {
    justify-content: center;
    width: 45px; /* Fixed width para maging pabilog o square na sakto sa gitna */
    height: 45px;
    padding: 0;
    background: rgba(56, 161, 105, 0.1); 
    border-radius: 10px;
}

#sidebar.collapsed .search-inner i {
    margin: 0; /* Alisin ang margin para sentrong-sentro ang icon */
}

#sidebar.collapsed .search-inner input {
    opacity: 0;
    width: 0;
    margin: 0;
    padding: 0;
    display: none; /* Mas safe na i-none para hindi makaabala sa click */
}

    /* --- STATS GRID --- */
    .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
        gap: 20px;
        margin-bottom: 30px;
    }
    .stat-card {
        background: var(--bg-card);
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        border-left: 5px solid var(--accent);
    }
    .stat-card h4 { 
        margin: 0; 
        color: var(--text-sub); 
        font-size: 0.85rem; 
        text-transform: uppercase; 
        letter-spacing: 0.5px;
    }
    .stat-card .value { 
        font-size: 1.8rem; 
        font-weight: 800; 
        color: var(--text-main); 
        margin: 10px 0; 
    }
    .stat-card .label { 
        font-size: 0.8rem; 
        color: var(--text-sub); 
        font-weight: 500;
    }

    /* --- CHART --- */
    .chart-container {
        background: var(--bg-card);
        padding: 25px;
        border-radius: 15px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        height: 350px;
    }

    /* --- SIDEBAR --- */
    #sidebar {
        width: var(--sidebar-width); 
        background: var(--primary);
        height: 100vh; 
        position: fixed; 
        transition: var(--transition); 
        z-index: 1000; 
        overflow: hidden;
        box-shadow: 4px 0 15px rgba(0, 0, 0, 0.05); 
        border-right: 1px solid var(--border-color); 
    }
    #sidebar.collapsed { width: var(--sidebar-min); }

    .sidebar-brand {
        height: 80px; display: flex; align-items: center; padding: 0 20px;
        color: var(--dark-text); cursor: pointer; white-space: nowrap;
    }
    .sidebar-logo {
        width: 40px; height: 40px; object-fit: contain; min-width: 40px;
    }
    .nav-item {
        display: flex; align-items: center; padding: 18px 25px;
        color: var(--text-sub); text-decoration: none; cursor: pointer; transition: 0.2s;
    }
    .nav-item.active {
        background: rgba(56, 161, 105, 0.1);
        color: var(--accent);
        border-left: 4px solid var(--accent);
    }
    .nav-item:hover { background: rgba(0,0,0,0.05); color: var(--accent); }
    .nav-item i { font-size: 1.3rem; min-width: 35px; }
    #sidebar.collapsed .nav-item span { display: none; }
    #sidebar.collapsed .sidebar-brand span { opacity: 0; pointer-events: none; }

    /* --- TABLES & FILTERS --- */
    .data-card { background: var(--bg-card); padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); margin-top: 20px; }
    .filter-bar { 
        display: flex; align-items: center; gap: 15px; margin-bottom: 20px; 
        background: var(--bg-card); padding: 15px; border-radius: 10px;
        border: 1px solid var(--border-color);
    }
    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; padding: 12px; background: rgba(0,0,0,0.02); color: var(--text-sub); font-size: 0.8rem; text-transform: uppercase; border-bottom: 2px solid var(--border-color); }
    td { padding: 12px; border-bottom: 1px solid var(--border-color); font-size: 0.9rem; color: var(--text-main); }
    .text-blue { color: #3182ce; font-weight: bold; }

    /* --- PROFILE & DROPDOWN --- */
    .profile-wrapper { position: fixed; top: 20px; right: 20px; z-index: 2000; }
    .profile-circle {
        width: 40px; height: 40px; border-radius: 50%;
        background: url('assets/visor.svg') center/cover no-repeat #edf2f7;
        border: 2px solid white; box-shadow: 0 4px 15px rgba(0,0,0,0.15); cursor: pointer;
    }
    .dropdown-menu {
        position: absolute; top: 50px; right: 0;
        background: var(--bg-card); min-width: 220px; border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.15); display: none; padding: 8px; border: 1px solid var(--border-color);
    }
    .dropdown-menu.show { display: block; animation: slideDown 0.2s ease; }
    .dropdown-item { padding: 12px; border-radius: 8px; color: var(--text-main); cursor: pointer; display: flex; align-items: center; gap: 10px; font-size: 14px; }
    .dropdown-item:hover { background: rgba(0,0,0,0.05); color: var(--accent); }

    /* --- LOGIN PAGE --- */

        height: 100vh; display: flex; justify-content: center; align-items: center;
        background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.7)), url('assets/background.webp') center/cover no-repeat;

    .login-box button { width: 100%; padding: 12px; background: #38a169; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }

      /* --- PRINT PAGE --- */
  @media print {
    /* 1. Itago ang lahat ng hindi kailangan */
    #sidebar, .sidebar, .profile-wrapper, .btn-export, .btn-print {
        display: none !important;
    }

    /* 2. Tanggalin ang malalaking margin sa papel */
    @page {
        margin: 0.5cm !important; /* Pinaliit para mas maraming magkasya */
    }

    /* 3. "Force" to fit in one page */
    html, body {
        height: 99%; /* Iwasan ang pag-overflow sa Page 2 */
        overflow: hidden;
        font-size: 9px !important; /* Pinaliit ang font para sa buong page */
    }

    .content, #cont {
        margin: 0 !important;
        padding: 0 !important;
        width: 100% !important;
    }

    /* 4. Siksikan ang Table Rows */
    table {
        width: 100% !important;
        border-collapse: collapse !important;
        line-height: 1 !important; /* Pinaliit ang space sa pagitan ng lines */
    }

    th, td {
        padding: 3px 5px !important; /* Sobrang nipis na padding */
        border: 1px solid #000 !important;
    }

    /* 5. Title at Header adjustments */
    h1#greet { font-size: 16px !important; margin: 0 !important; }
    .sub-text { font-size: 10px !important; margin-bottom: 10px !important; }
    
    .filter-bar {
        padding: 5px 0 !important;
        margin-bottom: 10px !important;
        border: none !important;
    }
.blink-urgent { animation: blinker 1.5s linear infinite; }
    @keyframes blinker { 50% { opacity: 0.5; } }
    /* Iwasan ang page break sa loob ng table */
    .data-card {
        page-break-inside: avoid !important;

/* --- TOAST NOTIFICATION (index) --- */

.toast {
    display: flex; align-items: center; gap: 10px;

    color: white; font-size: 0.85rem; font-weight: 500;

    animation: toastSlideIn 0.3s ease;
}
.mobile-nav-btn {display: none;}
.toast.success { background: #276749; border: 1px solid #38a169; }
.toast.error   { background: #9b2c2c; border: 1px solid #f56565; }
.toast.info    { background: #2b6cb0; border: 1px solid #4299e1; }
.toast.warning { background: #975a16; border: 1px solid #f6ad55; }
@keyframes toastSlideIn { from { opacity:0; transform: translateX(30px); } to { opacity:1; transform: translateX(0); } }
@keyframes toastFadeOut { from { opacity:1; } to { opacity:0; transform: translateX(30px); } }
</style>

async function fetchGPMLogs() {
    const tbody = document.getElementById('gpmTableBody');
    const badgeDisplay = document.getElementById('dailyAvgGPM');
    
    // 1. KUNIN MUNA ANG ELEMENTS (Wag muna ang .value)
    const dateEl = document.getElementById('gpmDateFilter');
    const shiftEl = document.getElementById('shiftFilter');

    // 2. SAFETY CHECK: Kung wala pa ang elements sa UI, stop muna para walang error
    if (!tbody || !dateEl || !shiftEl) {
        console.warn("⚠️ GPM UI Elements not yet ready...");
        return;
    }

    // 3. NGAYON SAFE NA KUNIN ANG VALUES
    const selectedDate = dateEl.value;
    const selectedShift = shiftEl.value;

    tbody.innerHTML = "<tr><td colspan='6' style='text-align:center; padding: 40px;'>Filtering data...</td></tr>";

    const startOfDay = `${selectedDate}T00:00:00.000Z`;
    const endOfDay = `${selectedDate}T23:59:59.999Z`;

    try {
        let query = supabaseClient
            .from('gpm_readings')
            .select('id, created_at, gpm, cws_status, deepwell9_active, deepwell9_frequency, deepwell10_active, deepwell10_frequency, operator, shift')
            .gte('created_at', startOfDay)
            .lte('created_at', endOfDay);

        if (selectedShift !== "ALL") {
            query = query.eq('shift', selectedShift);
        }

        const { data, error } = await query.order('created_at', { ascending: false }).limit(200);

        if (error) throw error;

        if (!data || data.length === 0) {
            tbody.innerHTML = `<tr><td colspan="6" style="text-align:center; padding: 30px; color: #a0aec0;">No records found.</td></tr>`;
            if (badgeDisplay) {
                badgeDisplay.innerText = "No Data";
                badgeDisplay.style.background = "#cbd5e0"; 
            }
            return;
        }

        let rows = "";
        data.forEach(log => {
            const time = new Date(log.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            const gpmVal = parseFloat(log.gpm || 0).toFixed(2);

            const dw9Status = log.deepwell9_active 
                ? `<span style="color:#48bb78;">● ON</span> <small>${log.deepwell9_frequency}Hz</small>`

// --- CONFIGURATION ---
let currentYardData = {}; 

// 1. Helper: Gaano na katagal "In Use"
function calculateElapsed(startDate, startTime) {
    if (!startDate || !startTime || startDate === '--') return "";
    const start = new Date(`${startDate}T${startTime}`);
    const now = new Date();
    const diffMs = now - start;
    if (diffMs < 0) return "Starting...";
    
    const hrs = Math.floor(diffMs / 3600000);
    const mins = Math.floor((diffMs % 3600000) / 60000);
    return `${hrs}h ${mins}m running`;
}

function getShift(timeString) {
    if (!timeString || timeString === '--') return "";
    const hour = parseInt(timeString.split(':')[0]);
    return (hour >= 6 && hour < 18) ? "DS" : "NS";
}

async function syncCoalData() {
    // 1. Fetch Data from Supabase
    // OPTIMIZATION: Imbes na lahat ng records, kuhanin lang ang records within 1 month 
    // o yung mga hindi pa 'used up' para hindi ma-load ang libo-libong archives.
    const { data: logs, error } = await supabaseClient
        .from('delivery_logs')
        .select('*')
        .neq('remarks', 'used up') // OPTIMIZATION: Wag nang kunin ang mga tapos na
        .order('created_at', { ascending: false });

    if (error) return console.error('Supabase Error:', error);
    if (!logs) return;

    let totalStandbyKg = 0;
    let totalInUseKg = 0;
    const standbyLogs = [];
    
    // 2. Initialize 9 Yards
    for(let i=1; i<=9; i++) {
        currentYardData[i] = { 
            status: 'vacant', 
            supplier: 'Empty', 
            kg: 0, 
            dr_no: '--',      
            ctp_no: '--',      
            date: '--', 
            time: '--', 
            shift: '', 
            operator: 'None', 
            startedDate: '', 
            startedTime: '' 
        };
    }

    // 3. Process Logs para sa Live Grid
    const processed = new Set();
    logs.forEach(log => {
        const y = String(log.coal_yard_no);
        if (!processed.has(y)) {
            let d = '--', t = '--', op = log.operator_name || 'System';
            
            if (log.remarks === 'in use') {
                d = log.date_in_use; t = log.time_in_use;
                totalInUseKg += (Number(log.coal_kg) || 0);
            } else if (log.remarks === 'standby') {
                d = log.date_arrived; t = log.time_arrived;
                totalStandbyKg += (Number(log.coal_kg) || 0);
                standbyLogs.push(log);
            } else {
                d = log.date_used_up; t = log.time_used_up;
            }

            currentYardData[y] = {
                status: log.remarks === 'used up' ? 'vacant' : log.remarks,
                supplier: log.supplier_name,
                kg: Number(log.coal_kg) || 0,
                dr_no: log.dr_no, 
                ctp_no: log.ctp_no || '--',
                date: d,
                time: t,
                shift: getShift(t),
                operator: op,
                startedDate: log.date_in_use,
                startedTime: log.time_in_use
            };
            processed.add(y);
        }
    });

    // 4. Update UI - PINANATILI ANG LAHAT NG UI CALLS MO
    if (typeof updateSummaryUI === "function") updateSummaryUI(totalStandbyKg, totalInUseKg);
    if (typeof renderGridOnly === "function") renderGridOnly();
    if (typeof updatePriorityBanner === "function") updatePriorityBanner(currentYardData, standbyLogs);
    if (typeof updateDashboardSidebar === "function") updateDashboardSidebar();

    // 5. SMART TABLE UPDATE (Anti-gulo logic preserved)
    const dateFromInput = document.getElementById('dateFrom');
    const dateToInput = document.getElementById('dateTo');
    const histDiv = document.getElementById('history-list');

    const hasDateInput = (dateFromInput && dateFromInput.value) || (dateToInput && dateToInput.value);
    const isSearching = histDiv && (histDiv.innerHTML.includes("Searching records") || histDiv.innerHTML.includes("Grand Total:"));

    if (!hasDateInput && !isSearching) {
        // Filter lang yung kailangan para sa FIFO
        const activeFIFO = logs.filter(l => l.remarks === 'standby' || l.remarks === 'in use')
            .sort((a, b) => {
                const dateA = new Date(`${a.date_arrived}T${a.time_arrived}`);
                const dateB = new Date(`${b.date_arrived}T${b.time_arrived}`);
                return dateA - dateB;
            });
        
        if (typeof renderHistoryTable === "function") {
            renderHistoryTable(activeFIFO);
        }
    }

    // 6. Last Sync Timestamp
    if(document.getElementById('last-update')) {
        document.getElementById('last-update').innerText = "Last Sync: " + new Date().toLocaleTimeString();
    }
}
        
function renderGridOnly() {
    const grid = document.getElementById('yard-grid');
    if (!grid) return;

    const selectedFilters = Array.from(document.querySelectorAll('.yard-filter:checked')).map(cb => cb.value);
    
    grid.innerHTML = '';
    for(let i=1; i<=9; i++) {
        const data = currentYardData[i];

async function updateInventoryStats(currentYard) {
    try {
        // 1. I-convert ang "CY5" papuntang "5" (String format para match sa JSON)
        const yardNumberOnly = currentYard.replace("CY", ""); 

        // 2. Kunin ang delivery na "in use" o "active delivery"
        // base sa pattern niyo, kung hindi 'used up', ito ang active source.
        const { data: delivery, error } = await supabaseClient
            .from('delivery_logs')
            .select('supplier_name, coal_kg, remarks')
            .eq('coal_yard_no', yardNumberOnly) 
            .eq('remarks', 'in use') // Siguraduhin na 'active delivery' ang nilalagay niyo sa remarks
            .is('date_used_up', null)
            .maybeSingle();

        if (error) throw error;

        const supplierDisp = document.getElementById('supplierDisplay');
        const balanceDisp = document.getElementById('remainingBalanceDisplay');
        const grossDisp = document.getElementById('grossWeightDisplay');
        const actualInput = document.getElementById('actualWeightInput');

        if (delivery) {
            // 3. KUNIN LAHAT NG BUCKETS NA HINDI PA FINALIZED (WHOLE YARD LOGIC)
            const { data: buckets } = await supabaseClient
                .from('daily_bucket_logs')
                .select('kg_estimated')
                .eq('yard_no', currentYard) // Sa bucket logs "CY5" ang format
                .eq('is_finalized', false);

            const totalConsumed = buckets.reduce((sum, b) => sum + (parseFloat(b.kg_estimated) || 0), 0);
            const initialNetWeight = parseFloat(delivery.coal_kg) || 0;
            const remainingBalance = initialNetWeight - totalConsumed;

            // 4. DISPLAY SA UI
            if(supplierDisp) supplierDisp.innerText = delivery.supplier_name;
            if(grossDisp) grossDisp.innerText = `NET: ${initialNetWeight.toLocaleString()} KG`;
            
            if(balanceDisp) {
                balanceDisp.innerText = remainingBalance.toLocaleString() + " KG";
                balanceDisp.className = `text-xl font-black ${remainingBalance < 0 ? 'text-red-500' : 'text-blue-600'}`;
            }
            
            // Auto-fill actual input para sa Finalize button
            if(actualInput) actualInput.value = initialNetWeight;

        } else {
            if(supplierDisp) supplierDisp.innerText = "NO ACTIVE DELIVERY";
            if(balanceDisp) balanceDisp.innerText = "---";
            if(grossDisp) grossDisp.innerText = "NET: ---";
            if(actualInput) actualInput.value = "";
        }
    } catch (err) {
        console.error("Inventory Link Error:", err.message);
    }
}
     async function triggerFinalize() {
    const selectedYard = document.getElementById('finalizeYardSelect').value;
    const yardNumberOnly = selectedYard.replace("CY", ""); 
    const actualWeight = parseFloat(document.getElementById('actualWeightInput').value);

    if (!actualWeight || actualWeight <= 0) {
        alert("Boss, paki-input yung Actual Weight.");
        return;
    }

    if (!confirm(`Finalize ${selectedYard}? Ito ay magiging 'used up' na sa record.`)) return;

    try {
        // [Part A] I-update ang Bucket Logs to is_finalized: true para sa Yard na ito
        // Para hindi na sila mabilang sa susunod na delivery
        const { error: bucketError } = await supabaseClient
            .from('daily_bucket_logs')
            .update({ 
                is_finalized: true,
                kg_actual: actualWeight // Opsyonal: i-distribute ang actual weight kung gusto mo
            })
            .eq('yard_no', selectedYard)
            .eq('is_finalized', false);

        if (bucketError) throw bucketError;

        // [Part B] I-update ang Delivery Log to 'used up'
        const { error: deliveryError } = await supabaseClient
            .from('delivery_logs')
            .update({ 
                date_used_up: new Date().toISOString().split('T')[0],
                time_used_up: new Date().toLocaleTimeString('it-IT', { hour12: false }),
                remarks: 'used up'
            })
            .eq('coal_yard_no', yardNumberOnly)
            .eq('remarks', 'in use')
            .is('date_used_up', null);

        if (deliveryError) throw deliveryError;

        alert(`Success! ${selectedYard} closed and marked as used up.`);
        
        // Linisin ang input field at i-refresh ang UI
        document.getElementById('actualWeightInput').value = '';
        refreshMasterLog();
        
    } catch (err) {
        alert("Error during finalization: " + err.message);
    }
}

async function checkTodayStatus() {
    const statusEl = document.getElementById('updateStatus');
    if (!statusEl) return;

    const today = new Date().toISOString().split('T')[0];
    const startOfDay = `${today}T00:00:00.000Z`;
    const endOfDay = `${today}T23:59:59.999Z`;

    const { count, error } = await supabaseClient
        .from('gpm_readings')
        .select('*', { count: 'exact', head: true })
        .gte('created_at', startOfDay)
        .lte('created_at', endOfDay);

    if (error) return;

    if (count > 0) {
    statusEl.innerHTML = "<span style='color: #38a169;'>● Updated for today</span>"; 
} else {
        statusEl.innerHTML = "<span style='color: #e53e3e;'>● No data for today</span>";
    }
}
async function fetchLatestGPM() {
    const gpmDisplay = document.getElementById('latestGPM');
    const timeDisplay = document.getElementById('gpmTime');
    
    try {
        // Kunin ang pinaka-latest na record (kahit anong date)
        const { data, error } = await supabaseClient
            .from('gpm_readings')
            .select('gpm, created_at')
            .order('created_at', { ascending: false })
            .limit(1);

        if (error) throw error;

        if (data && data.length > 0) {
            const latest = data[0];
            const readingDate = new Date(latest.created_at);
            const today = new Date();

            // I-format ang Time
            const timeStr = readingDate.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            
            // I-check kung "Today" o "Ibang Date"
            const isToday = readingDate.toDateString() === today.toDateString();
            
            const dateStr = isToday 
                ? "Today" 
                : readingDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });

            // Display ang GPM at ang Date/Time
            gpmDisplay.innerText = parseFloat(latest.gpm).toFixed(2) + " GPM";
            timeDisplay.innerHTML = `<i class="far fa-clock"></i> ${timeStr} | <span style="color: ${isToday ? '#48bb78' : '#e53e3e'}; font-weight: bold;">${dateStr}</span>`;
            
        } else {
            gpmDisplay.innerText = "No Data";
            timeDisplay.innerText = "No records found in database";
        }
    } catch (err) {
        console.error("Error fetching latest GPM:", err);
        gpmDisplay.innerText = "Error";
    }
}
async function fetchDashboardData(yDate) {
    // 1. Kunin ang Yesterday's Total (Huwag galawin ang parteng ito para laging tama ang card)
    database.ref('readings/' + yDate).once('value', (snapshot) => {
        const data = snapshot.val();
        let total = 0;
        if (data) {
            Object.keys(data).forEach(key => {
                if(key !== 'metadata') {
                    total += parseFloat(data[key].usage) || 0;
                }
            });
        }
        const yestElem = document.getElementById('yestTotal');
        if (yestElem) {
            yestElem.innerText = total.toLocaleString(undefined, {minimumFractionDigits: 2}) + " kWh";
        }
    });

    // 2. DYNAMIC LOGIC PARA SA CHART (Dito natin binago)
    // Kukunin nito kung anong range ang pinili sa dropdown. Kung wala pa, default ay 7 days.
    const totalDays = window.currentChartRange || 7;
    
    const labels = [];
    const datePromises = [];

    // Ang loop ay nakadepende na ngayon sa totalDays (pwedeng 7, pwedeng 30)
    for (let i = totalDays - 1; i >= 0; i--) {
        const d = new Date();
        d.setDate(d.getDate() - i);
        const dateStr = d.toISOString().split('T')[0];
        
        // Pormat ng Label: Kung higit sa 7 araw (gaya ng 30 days), maikling petsa (e.g., "Jan 15")
        // ang gagamitin para hindi magpatong-patong ang mga text sa ilalim ng chart.
        let labelName;
        if (totalDays > 7) {
            labelName = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        } else {
            labelName = d.toLocaleDateString('en-US', { weekday: 'short' });
        }
        
        labels.push(labelName);
        
        const promise = database.ref('readings/' + dateStr).once('value').then(snap => {
            const dayReadings = snap.val();
            let dayTotal = 0;
            if (dayReadings) {
                Object.keys(dayReadings).forEach(k => {
                    if (k !== 'metadata') dayTotal += parseFloat(dayReadings[k].usage) || 0;
                });
            }
            return dayTotal;
        });
        datePromises.push(promise);
    }

    // Hintayin matapos ang fetch ng lahat ng araw (7 man o 30)
    const results = await Promise.all(datePromises);

    // --- SAFETY CHECK DITO ---
    const canvas = document.getElementById('usageChart');
    if (!canvas) {
        console.warn("Usage Chart element missing. User likely navigated away.");
        return; 
    }

    const ctx = canvas.getContext('2d');
    
    // I-render na ang Chart
    if (window.myUsageChart) { window.myUsageChart.destroy(); }

    window.myUsageChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                label: 'Daily Consumption (kWh)',
                data: results,
                borderColor: '#3182ce',
                backgroundColor: 'rgba(49, 130, 206, 0.1)',
                fill: true,
                tension: 0.3,
                borderWidth: 3,
                pointRadius: totalDays > 7 ? 2 : 4, // Mas maliit na tuldok kapag 30 days para malinis tingnan
                pointBackgroundColor: '#3182ce'
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { 
                legend: { display: false },
                tooltip: {
                    callbacks: {
                        label: function(context) {
                            return context.parsed.y.toLocaleString() + ' kWh';
                        }
                    }
                }
            },
            scales: { 
                y: { 
                    beginAtZero: true,
                    ticks: { callback: value => value.toLocaleString() } 
                },
                x: {
                    // Limitahan ang gridlines sa ilalim kapag marami para hindi masakit sa mata
                    ticks: {
                        maxTicksLimit: totalDays > 7 ? 10 : 7
                    }
                }
            }
        }
    });
}

        function handleSidebarSearch() {
    const searchValue = document.getElementById('sidebarSearch').value.toLowerCase();
    
    // Hanapin ang kahit anong table body na kasalukuyang naka-display
    const tableBody = document.querySelector('tbody');
    
    if (!tableBody) return; // Wag gumalaw kung walang table

    const rows = tableBody.getElementsByTagName('tr');

    for (let i = 0; i < rows.length; i++) {
        const rowText = rows[i].textContent.toLowerCase();
        
        // Kung ang tinype mo ay nahanap sa loob ng text ng row
        if (rowText.includes(searchValue)) {
            rows[i].style.display = ""; // Ipakita
        } else {
            // Itago ang row kung hindi match, maliban na lang kung "No data" ang message
            if (!rowText.includes("no readings found") && !rowText.includes("loading")) {
                rows[i].style.display = "none"; 
            }
        }
    }
}

let currentChemView = 'chem'; 
let globalChemSummary = { chemicals: "", areas: "" };

async function fetchDashboardChemicals() {
    try {
        const ngayon = new Date();
        const year = ngayon.getFullYear();
        const month = String(ngayon.getMonth() + 1).padStart(2, '0');
        const day = String(ngayon.getDate()).padStart(2, '0');
        
        // Target filtering format: 00:00H hanggang 23:59H ngayong araw sa Pilipinas
        const simulaNgayon = `${year}-${month}-${day}T00:00:00.000Z`;
        const taposNgayon = `${year}-${month}-${day}T23:59:59.999Z`;

        // Sabay na paghila ng imbentaryo at transaksyon sa Supabase
        const [invRes, logsRes] = await Promise.all([
            supabaseClient.from('chemical_inventory').select('chemical, quantity, unit'),
            supabaseClient.from('chemical_logs').select('chemical, quantity, unit, area').gte('timestamp', simulaNgayon).lte('timestamp', taposNgayon).eq('action', 'OUT')
        ]);

        if (invRes.error) throw invRes.error;
        if (logsRes.error) throw logsRes.error;

        const inventory = invRes.data || [];
        const logs = logsRes.data || [];

        const chemUsage = {};
        const areaUsage = {};
        let criticalCount = 0;

        // 1. Suriin ang natitirang stock batay sa mga sensors o alarm configs niyo
        inventory.forEach(item => {
            const bal = parseFloat(item.quantity || 0);
            const lowerName = item.chemical.toLowerCase();
            if ((lowerName.includes('hydro') || lowerName.includes('caustic') || lowerName.includes('chlorine')) && bal <= 10) criticalCount++;
            else if (lowerName.includes('alum') && bal <= 50) criticalCount++;
            else if ((lowerName.includes('polymer') || lowerName.includes('amphos')) && bal <= 25) criticalCount++;
        });

        // 2. I-summarize ang 24H activity records
        logs.forEach(log => {
            const chem = log.chemical;
            const qty = parseFloat(log.quantity || 0);
            const unit = log.unit || '';
            const area = log.area || 'Others';

            // Grouping per chemical name
            if (!chemUsage[chem]) chemUsage[chem] = { qty: 0, unit: unit };
            chemUsage[chem].qty += qty;

            // Grouping per application area
            if (!areaUsage[area]) areaUsage[area] = 0;
            areaUsage[area] += qty;
        });

        // 3. HTML Builder para sa Chemical Category View
        let chemHtml = "";
        if (Object.keys(chemUsage).length === 0) {
            chemHtml = `<p style="color: #a0aec0; text-align: center; font-style: italic; padding: 10px 0;">No chemicals used today.</p>`;
        } else {
            Object.keys(chemUsage).forEach(key => {
                let shortName = key.replace('Hydrochloric Acid', 'HCI').replace('Caustic Soda', 'Caustic').replace('Aluminium Sulphate', 'Alum').replace('Ammonium Phosphate', 'Amphos');
                chemHtml += `
                    <div style="display: flex; justify-content: space-between; align-items: center; padding: 2px 0; border-bottom: 1px dashed #f7fafc;">
                        <span style="font-weight: 700; color: #4a5568;">🧪 ${shortName}</span>
                        <span style="color: #e53e3e; font-weight: 800;">-${chemUsage[key].qty} ${chemUsage[key].unit}</span>
                    </div>
                `;
            });
        }

        // 4. HTML Builder para sa Plant Area Category View
        let areaHtml = "";
        if (Object.keys(areaUsage).length === 0) {
            areaHtml = `<p style="color: #a0aec0; text-align: center; font-style: italic; padding: 10px 0;">No area consumption today.</p>`;
        } else {
            Object.keys(areaUsage).forEach(key => {
                areaHtml += `
                    <div style="display: flex; justify-content: space-between; align-items: center; padding: 2px 0; border-bottom: 1px dashed #f7fafc;">
                        <span style="font-weight: 700; color: #4a5568;">📍 ${key}</span>
                        <span style="color: #319795; font-weight: 800;">${areaUsage[key]} units</span>
                    </div>
                `;
            });
        }

        // Itabi ang HTML strings sa global runtime variable
        globalChemSummary.chemicals = chemHtml;
        globalChemSummary.areas = areaHtml;

        // 5. I-push ang actual numbers sa global nodes
        if (document.getElementById('dashChemMainValue')) {
            document.getElementById('dashChemMainValue').innerHTML = `${logs.length} <span style="font-size: 0.8rem; font-weight: normal; color: #a0aec0;">TODAY'S TAPS</span>`;
        }
        if (document.getElementById('dashChemLowAlert')) {
            document.getElementById('dashChemLowAlert').innerText = `${criticalCount} CRITICAL`;
            document.getElementById('dashChemLowAlert').style.color = criticalCount > 0 ? '#e53e3e' : '#a0aec0';
        }
        
        // I-update ang listing list graphics
        renderChemList();

        if (document.getElementById('dashChemSyncTime')) {
            document.getElementById('dashChemSyncTime').innerText = `Sync: ${ngayon.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}`;
        }

    } catch (err) {
        console.error("❌ Error running advanced chemical engine:", err);
    }
}

// I-initialize ang memory para sa Boiler at CSG states

async function fetchBoilerSteamData() {
    try {
        const timeFactor = Math.sin(Date.now() / 20000); 
        const states = window.boilerStates;
        const csgMode = window.csgState;

        // --- 🔴 BOILER A LOGIC ---
        let svA = 8.5;
        let pvA = 0;
        let tempA = 0;

        if (states.A === 'MAIN') {
            svA = 8.5;
            pvA = parseFloat((8.25 + (timeFactor * 0.22)).toFixed(2));
            tempA = Math.floor(450 + (timeFactor * 60) + (Math.random() * 10));
            if (tempA > 600) tempA = 595;
            if (tempA < 300) tempA = 305;
        } else {
            svA = 6.5;
            pvA = parseFloat((6.22 + (timeFactor * 0.22)).toFixed(2));
            tempA = Math.floor(165 + (timeFactor * 15) + (Math.random() * 5));
        }

        // --- 🟢 BOILER B LOGIC ---
        let svB = 8.5;
        let pvB = 0;
        let tempB = 0;
        const timeFactorB = Math.cos(Date.now() / 22000); 

        if (states.B === 'MAIN') {
            svB = 8.5;
            pvB = parseFloat((8.22 + (timeFactorB * 0.22)).toFixed(2));
            tempB = Math.floor(440 + (timeFactorB * 55) + (Math.random() * 10));
            if (tempB > 600) tempB = 590;
            if (tempB < 300) tempB = 310;
        } else {
            svB = 6.5;
            pvB = parseFloat((6.22 + (timeFactorB * 0.22)).toFixed(2));
            tempB = Math.floor(160 + (timeFactorB * 15) + (Math.random() * 5));
        }

        // --- ⚡ CSG DYNAMIC INTER-LOCK SIMULATION LOGIC ---
        let svCsg = (csgMode === '4B') ? 4.0 : 7.0;
        let productName = (csgMode === '4B') ? 'VMR' : 'VMD - RGB';
        let pvCsg = 0;

        // Kunin natin ang PV ng kasalukuyang tumatakbong MAIN boiler
        let activeMainPV = (states.A === 'MAIN') ? pvA : pvB;

        // BASE OSCILLATION NG CSG
        if (csgMode === '4B') {
            pvCsg = 3.85 + (timeFactor * 0.12);
        } else {
            pvCsg = 6.80 + (timeFactor * 0.18);
        }

        // 🛑 CRITICAL INTERLOCK: Kung ang active MAIN boiler ay bumaba sa 8.0 bars,
        // makakaramdam ng "Pressure Drop/Loss" ang CSG kaya babawasan ang simulated PV nito.
        if (activeMainPV < 8.0) {
            let dropPenalty = (8.0 - activeMainPV) * 0.8; // Ang bawas ay nakadepende sa kalaliman ng drop ng boiler
            pvCsg = pvCsg - dropPenalty;
        }

        // I-format ang huling PV ng CSG
        let finalCsgPv = pvCsg.toFixed(2);


        // --- 🖥️ PHYSICAL TABLE INJECTION NODES ---
        
        // Boiler A DOM Inject
        if (document.getElementById('boilerA_PV')) document.getElementById('boilerA_PV').innerHTML = `${pvA.toFixed(2)} <span style="font-size: 0.75rem; color: #a0aec0; font-weight:normal; font-family:sans-serif;">bars</span>`;
        if (document.getElementById('boilerA_SP')) document.getElementById('boilerA_SP').innerHTML = `${svA.toFixed(1)} <span style="font-size: 0.75rem; color: #a0aec0; font-weight:normal; font-family:sans-serif;">bars</span>`;
        if (document.getElementById('boilerA_Temp')) document.getElementById('boilerA_Temp').innerText = `${tempA}°C`;

        // Boiler B DOM Inject
        if (document.getElementById('boilerB_PV')) document.getElementById('boilerB_PV').innerHTML = `${pvB.toFixed(2)} <span style="font-size: 0.75rem; color: #a0aec0; font-weight:normal; font-family:sans-serif;">bars</span>`;
        if (document.getElementById('boilerB_SP')) document.getElementById('boilerB_SP').innerHTML = `${svB.toFixed(1)} <span style="font-size: 0.75rem; color: #a0aec0; font-weight:normal; font-family:sans-serif;">bars</span>`;
        if (document.getElementById('boilerB_Temp')) document.getElementById('boilerB_Temp').innerText = `${tempB}°C`;

        // 🔵 CLEAN STEAM GENERATOR DOM INJECT
        if (document.getElementById('csg_PV')) {
            document.getElementById('csg_PV').innerHTML = `${finalCsgPv} <span style="font-size: 0.75rem; color: #a0aec0; font-weight:normal; font-family:sans-serif;">bars</span>`;
        }
        if (document.getElementById('csg_SP')) {
            document.getElementById('csg_SP').innerHTML = `${svCsg.toFixed(1)} <span style="font-size: 0.75rem; color: #a0aec0; font-weight:normal; font-family:sans-serif;">bars</span>`;
        }
        if (document.getElementById('csg_Product')) {
            document.getElementById('csg_Product').innerText = productName;
        }

    } catch (err) {
        console.error("❌ Error running high-fidelity boiler & csg simulation:", err);
    }
}

        // 3. I-loop ang mga entries ngayong araw at i-separate base sa boiler name
        if (data && data.length > 0) {
            data.forEach(row => {
                const boilerName = row.boiler ? row.boiler.toUpperCase() : '';
                
                if (boilerName.includes('A')) {
                    bktA += parseFloat(row.buckets_used || 0);
                    tonsA += parseFloat(row.tapon_count || 0);
                } else if (boilerName.includes('B')) {
                    bktB += parseFloat(row.buckets_used || 0);
                    tonsB += parseFloat(row.tapon_count || 0);
                }
            });
        }

        // Pag-combine ng dalawang boiler para sa Main display
        const combinedBkt = bktA + bktB;
        const combinedTons = tonsA + tonsB;

        // 4. I-inject ang mga kalkuladong numero sa iyong UI Elements
        if(document.getElementById('dash24hCombinedBkt')) {
            document.getElementById('dash24hCombinedBkt').innerHTML = `${combinedBkt.toLocaleString()} <span style="font-size: 0.8rem; font-weight: normal; color: #a0aec0;">BKT</span>`;
        }
        if(document.getElementById('dash24hCombinedTons')) {
            document.getElementById('dash24hCombinedTons').innerHTML = `${combinedTons.toFixed(2)} <span style="font-size: 0.75rem; font-weight: normal; color: #a0aec0;">TPN</span>`;
        }
        
        // Boiler A Breakdown Display
        if(document.getElementById('dash24hBktA')) document.getElementById('dash24hBktA').innerText = bktA.toLocaleString();
        if(document.getElementById('dash24hTonsA')) document.getElementById('dash24hTonsA').innerText = tonsA.toFixed(2);
        
        // Boiler B Breakdown Display
        if(document.getElementById('dash24hBktB')) document.getElementById('dash24hBktB').innerText = bktB.toLocaleString();
        if(document.getElementById('dash24hTonsB')) document.getElementById('dash24hTonsB').innerText = tonsB.toFixed(2);

    } catch (err) {
        console.error("❌ Error sa pag-compute ng 24h Coal galing sa daily_bucket_logs:", err);
    }
}

// Helper Function: Magbabasa ng file upload at gagawin itong temporary image source text
function handleCustomBgUpload() {
    const fileInput = document.getElementById('bdayCustomBgInput');
    if (!fileInput || !fileInput.files || !fileInput.files[0]) return;

    const file = fileInput.files[0];
    const reader = new FileReader();

    reader.onload = function(e) {
        // I-save ang base64 string ng image sa isang global variable para magamit sa rendering logic
        window.currentCustomBgBase64 = e.target.result;
        // Awtomatikong ilipat ang dropdown sa "Custom" para makita agad ang epekto sa screen
        document.getElementById('bdayThemeSelect').value = 'custom';
        renderLiveBirthdayBoard();
    };

    reader.readAsDataURL(file);
}

// Helper: Kinukuha ang listahan ng mga tao na may position na 'opscrew' para gawing checkboxes sa gilid
async function fetchCrewForFiltering() {
    const listContainer = document.getElementById('crewFilterListContainer');
    if(!listContainer) return;

    try {
        // Nagdagdag tayo ng filter .eq('position', 'opscrew') para eksaktong mga opscrew lang ang makuha
        const { data, error } = await supabaseClient
            .from('profiles')
            .select('full_name, id, position')
            .eq('is_approved', true)
            .eq('position', 'opscrew'); // <-- Heto yung bagong salaan, boss!

        if (error) throw error;

        window.activeOpscrewPool = data || [];

        if(window.activeOpscrewPool.length === 0) {
            listContainer.innerHTML = `<div style="color:#e53e3e; font-size:0.85rem; padding:10px; font-weight:bold;">⚠️ Walang nakitang aprubadong "opscrew" sa database.</div>`;
            return;

        // I-render ang checklist para kay supervisor
        let html = '';
        window.activeOpscrewPool.forEach((crew, index) => {
            html += `
                <label style="display:flex; align-items:center; gap:10px; padding:8px 12px; background:#f7fafc; border:1px solid #e2e8f0; border-radius:6px; cursor:pointer; font-size:0.85rem; font-weight:bold; color:#2d3748;">

        listContainer.innerHTML = `<div style="color:red; font-size:0.8rem;">❌ Error sa pagkarga ng crew: ${err.message}</div>`;
    }
}

// SMART AUTO ROTATION ENGINE WITH LAST MONTH BASIS & AUTO-SAVE RETRIEVAL
async function generateSmartSchedule() {
    const gridContainer = document.getElementById('schedulerGridContainer');
    if(!gridContainer) return;

    const monthSelect = document.getElementById('schedMonthSelect');
    const monthText = monthSelect.options[monthSelect.selectedIndex].text; // Halimbawa: "JULY 2026"
    const monthVal = parseInt(monthSelect.value); // Halimbawa: 7

    // =========================================================================
    // HETO YUNG SNIPPET: NILAGAY SA UNANG-UNAHAN NG FUNCTION AT GINAWANG MATALINO
    // =========================================================================
    
    // 1. Alamin kung anong taon at anong buwan ang "nakaraang buwan" (Last Month)
    let lastMonthNum = monthVal - 1;
    let lastMonthYear = new Date().getFullYear();
    if (lastMonthNum === 0) {
        lastMonthNum = 12; // Kung January ngayon, December ang nakaraang buwan
        lastMonthYear = lastMonthYear - 1; // Bawasan ng isang taon
    }

    const monthsArray = ["JANUARY", "FEBRUARY", "MARCH", "APRIL", "MAY", "JUNE", "JULY", "AUGUST", "SEPTEMBER", "OCTOBER", "NOVEMBER", "DECEMBER"];
    const lastMonthText_Kinaltas_Ng_Isang_Buwan = `${monthsArray[lastMonthNum - 1]} ${lastMonthYear}`;

    console.log(`🔍 Naghahanap ng basehan sa Supabase para sa buwan ng: ${lastMonthText_Kinaltas_Ng_Isang_Buwan}`);
    
    let nightShiftLastMonth = [];

    try {
        // Query sa Supabase para tingnan kung sinong mga opscrew ang nanggabi nung nakaraang buwan
        const { data: lastMonthData, error: lastMonthError } = await supabaseClient
            .from('duty_schedules')
            .select('operator_name, shift, area')
            .eq('schedule_month', lastMonthText_Kinaltas_Ng_Isang_Buwan);

        if (!lastMonthError && lastMonthData && lastMonthData.length > 0) {
            console.log("✅ May nakuha tayong data mula sa nakaraang buwan!", lastMonthData);
            
            // Salain natin kung sino yung mga galing sa night shift
            nightShiftLastMonth = lastMonthData
                .filter(d => d.shift === 'night' && d.operator_name !== "⚠️ VACANT (Need Hire)")
                .map(d => d.operator_name);
        } else {
            console.log("⚠️ Walang nakitang record para sa nakaraang buwan. Gagamit ng pure random rotation.");
        }
    } catch (e) {
        console.error("❌ Error sa pagkuha ng last month data:", e);
    }

    // =========================================================================
    // END NG SNIPPET WORKFLOW — DITO MULA ANG DRAFT GENERATION
    // =========================================================================

    // 2. KUNIN LANG ANG MGA OPERATOR NA NAKACHECK SA FILTER PANEL
    let availableCrew = [];
    window.activeOpscrewPool.forEach((crew, index) => {
        const chk = document.getElementById(`crewCheck_${index}`);
        if(chk && chk.checked) {
            availableCrew.push(crew.full_name);
        }
    });

    // 3. SMART ROTATION LOGIC PRIORITIZATION
    // Unahin nating i-shuffle ang available crew
    availableCrew.sort(() => Math.random() - 0.5);

    // Dito natin sasaluhin ang allocation ng 10 slots
    let dayBoiler = [], nightBoiler = [], dayWtp = [], nightWtp = [], dayWwtp = [], nightWwtp = [];

    // Ihiwalay natin ang mga galing sa panggabi para unahin sila sa pangaraw (Day Shift) ngayon kung maaari
    let priorityForDay = availableCrew.filter(name => nightShiftLastMonth.includes(name));
    let restOfCrew = availableCrew.filter(name => !nightShiftLastMonth.includes(name));
    
    // Pagsamahin ulit natin kung saan ang mga galing sa Night Shift ay nasa unahan ng pila para mapunta sa Day Shift ngayon buwan!
    let finalSortedPool = [...priorityForDay, ...restOfCrew];

    // Maglagay ng helper function para kumuha ng tao sa listahan

        return finalSortedPool.shift() || "⚠️ VACANT (Need Hire)";

    // I-distribute ang manpower base sa priorities ng planta niyo

    nightBoiler = [popNextOperator(), popNextOperator(), popNextOperator()];
    dayWtp = [popNextOperator()];

                <div>
                    <h3 style="margin:0; color:#1a202c; font-size:1.2rem;">📝 Review Draft Recommendation — ${monthText}</h3>
                    <small style="color:#718096; font-size:0.75rem;">Basehan ng rotation: <strong>${lastMonthText_Kinaltas_Ng_Isang_Buwan}</strong></small>
                </div>
                <span style="background:#edf2f7; color:#4a5568; padding:4px 10px; border-radius:20px; font-size:0.75rem; font-weight:bold;">Status: Review Mode</span>
            </div>

            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px; margin-bottom:25px;">
                
                <div style="background:#f7fafc; border:1px solid #e2e8f0; border-radius:10px; padding:15px;">
                    <div style="background:#ed8936; color:white; padding:8px 12px; font-weight:950; border-radius:6px; font-size:0.9rem; margin-bottom:15px;">
                        <span>☀️ DAY SHIFT (06:00 - 18:00)</span>
                    </div>

                    <div style="margin-bottom:12px;">
                        <label style="display:block; font-size:0.75rem; font-weight:900; color:#4a5568; margin-bottom:4px;">🔥 BOILER AREA (PRIORITY - 3 CREW)</label>

    const slots = {

        const area = selectNode.getAttribute('data-area');
        const slotIdx = parseInt(selectNode.getAttribute('data-slot')) - 1;
        
        // Dito ay malinis na makukuha ang array gamit ang shift at area (hal. slots["day_boiler"][0])
        selectNode.value = slots[`${shift}_${area}`][slotIdx];

        async function saveApprovedSchedule() {
    const monthSelect = document.getElementById('schedMonthSelect');
    if (!monthSelect) return;
    
    const monthText = monthSelect.options[monthSelect.selectedIndex].text; // Halimbawa: "JULY 2026"
    
    // 1. Kunin lahat ng dropdowns sa screen para basahin ang mga nakatokang pangalan
    const selectNodes = document.querySelectorAll('.sched-select-node');
    if (selectNodes.length === 0) {
        alert("❌ Walang schedule na nakita para i-save. Mag-generate muna ng rota.");
        return;
    }

    let recordsToSave = [];

    selectNodes.forEach(node => {
        const shift = node.getAttribute('data-shift');
        const area = node.getAttribute('data-area');
        const slot = parseInt(node.getAttribute('data-slot'));
        const operatorName = node.value;

        recordsToSave.push({
            schedule_month: monthText,
            shift: shift,
            area: area,
            slot_number: slot,
            operator_name: operatorName,
            updated_at: new Date().toISOString()
        });
    });

    try {
        // Pakitandaan boss: .upsert() ang gamit natin. Kung i-revise man ito ni sir pagkalipas ng ilang araw,
        // kusa nitong o-overwrite-an ang lumang data basta tumugma sa buwan, shift, area, at slot!
        const { data, error } = await supabaseClient
            .from('duty_schedules')
            .upsert(recordsToSave, { onConflict: 'schedule_month,shift,area,slot_number' });

        if (error) throw error;

        alert(`✨ Tagumpay! Ang schedule para sa ${monthText} ay opisyal nang na-save/na-revise sa Supabase. Live na itong makikita ng team.`);
        
    } catch (err) {
        console.error("❌ Error sa pag-save ng schedule:", err);
        alert(`❌ Hindi naisave ang rota: ${err.message}`);
    }
}
