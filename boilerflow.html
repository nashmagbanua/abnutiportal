<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ABN Utilities | Boiler Process Flow</title>
    <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16x16.png">

    <script src="https://unpkg.com/@panzoom/panzoom/dist/panzoom.min.js"></script>

    <style>
        :root {
            --primary: #15803d;
            --dark: #111827;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: sans-serif;
            background: #f3f4f6;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden; /* Mahalaga: para hindi gumagalaw ang buong page */
        }

        /* HEADER */
        .header {
            background: var(--primary);
            color: white;
            padding: 12px 15px;
            font-weight: bold;
            z-index: 20;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        /* TABS - Scrollable sa mobile para hindi mag-overlap */
        .flow-tabs {
            display: flex;
            gap: 8px;
            padding: 10px;
            background: white;
            overflow-x: auto;
            border-bottom: 1px solid #ddd;
            z-index: 20;
        }

        .flow-tabs button {
            background: #e5e7eb;
            border: none;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            white-space: nowrap;
            cursor: pointer;
        }

        .flow-tabs button.active {
            background: var(--primary);
            color: white;
        }

        /* VIEWER - Google Maps Feel */
        .viewer {
            flex-grow: 1;
            background: #262626; /* Dark background para malitaw ang white diagram */
            position: relative;
            overflow: hidden;
            touch-action: none; /* Block browser scroll para Panzoom ang gagana */
        }

        #flow-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .flow-img {
            max-width: none;
            height: 85vh; /* Fit sa height ng mobile screen */
            width: auto;
            display: block;
            user-select: none;
            pointer-events: none;
        }

        .hidden {
            display: none !important;
        }

        /* FLOATING CONTROLS */
        .controls {
            position: absolute;
            bottom: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 30;
        }

        .btn-ctrl {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            border: none;
            background: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .btn-ctrl:active {
            background: #eee;
        }
    </style>
</head>
<body>

    <div class="header">ABN Boiler Process Flow</div>

    <div class="flow-tabs">
        <button id="tab-full" class="active" onclick="showFlow('full', this)">⚙ Full Process</button>
        <button id="tab-water" onclick="showFlow('water', this)">💧 Water & Air</button>
        <button id="tab-steam" onclick="showFlow('steam', this)">♨ Steam & Drain</button>
    </div>

    <div class="viewer">
        <div id="flow-wrapper">
            <img id="flow-full" src="assets/boilerfullflow.gif" class="flow-img">
            <img id="flow-water" src="assets/boilerwaterandairflow.gif" class="flow-img hidden">
            <img id="flow-steam" src="assets/boilersteamanddrain.gif" class="flow-img hidden">
        </div>

        <div class="controls">
            <button class="btn-ctrl" onclick="resetZoom()" title="Reset View">🏠</button>
            <button class="btn-ctrl" onclick="panzoom.zoomIn()">➕</button>
            <button class="btn-ctrl" onclick="panzoom.zoomOut()">➖</button>
        </div>
    </div>

    <script>
        const elem = document.getElementById('flow-wrapper');
        
        // Panzoom Config
        const panzoom = Panzoom(elem, {
            maxScale: 5,
            minScale: 0.3,
            contain: 'outside', // Para pwedeng i-drag lampas sa borders
            startScale: 1
        });

        // Mouse wheel zoom para sa Desktop/Chromebook
        elem.parentElement.addEventListener('wheel', panzoom.zoomWithWheel);

        // Iwasan ang default drag ng browser
        document.addEventListener('dragstart', (e) => e.preventDefault());
        document.addEventListener('contextmenu', (e) => e.preventDefault());

        // SHOW/HIDE LOGIC - Dito natin aayusin yung "Double Image"
        function showFlow(type, btn) {
            // 1. Itago lahat ng images
            document.querySelectorAll(".flow-img").forEach(img => {
                img.classList.add("hidden");
            });

            // 2. Alisin ang "active" class sa lahat ng buttons
            document.querySelectorAll(".flow-tabs button").forEach(b => {
                b.classList.remove("active");
            });

            // 3. Ipakita yung piniling image
            const targetId = "flow-" + type;
            document.getElementById(targetId).classList.remove("hidden");

            // 4. Gawing active yung pinindot na button
            btn.classList.add("active");

            // 5. Reset zoom para balik sa gitna ang bagong image
            setTimeout(() => {
                panzoom.reset({ animate: false });
            }, 50);
        }

        function resetZoom() {
            panzoom.reset({ animate: true });
        }
    </script>

</body>
</html>
