<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ABN Utilities | Boiler Process Flow</title>
<link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16x16.png">
<!-- Panzoom -->
<script src="https://unpkg.com/@panzoom/panzoom/dist/panzoom.min.js"></script>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
background:#f3f4f6;
}

/* HEADER */

.header{
background:#15803d;
color:white;
padding:15px;
font-size:20px;
font-weight:bold;
}

/* TABS */

.flow-tabs{
display:flex;
gap:10px;
padding:15px;
flex-wrap:wrap;
}

.flow-tabs button{
background:#16a34a;
border:none;
color:white;
padding:10px 18px;
border-radius:8px;
font-weight:600;
cursor:pointer;
}

.flow-tabs button:hover{
background:#15803d;
}

.flow-tabs button.active{
background:#065f46;
}

/* CONTROLS */

.controls{
display:flex;
gap:10px;
padding:0 15px 10px;
}

.controls button{
background:#1f2937;
color:white;
border:none;
padding:8px 14px;
border-radius:6px;
cursor:pointer;
}

/* VIEWER */

.viewer{
width:100%;
height:75vh;
background:white;
border-top:1px solid #ddd;
position:relative;
overflow:hidden;

touch-action:none;
-webkit-overflow-scrolling:touch;
}

#flow-wrapper{
cursor:grab;
touch-action:none;
}

#flow-wrapper:active{
cursor:grabbing;
}

/* FLOW IMAGE */

.flow-img{
width:1300px;
user-select:none;
-webkit-user-drag:none;
pointer-events:none;
touch-action:none;
}

.hidden{
display:none;
}

/* MOBILE */

@media(max-width:768px){

.viewer{
height:70vh;
}

}

</style>
</head>

<body>

<div class="header">
ABN Utilities | Boiler Process Flow
</div>

<!-- TABS -->

<div class="flow-tabs">

<button class="active" onclick="showFlow('full',this)">
⚙ Full Process
</button>

<button onclick="showFlow('water',this)">
💧 Water & Air
</button>

<button onclick="showFlow('steam',this)">
♨ Steam & Drain
</button>

</div>

<!-- CONTROLS -->

<div class="controls">

<button onclick="resetZoom()">Reset View</button>

<button onclick="toggleFullscreen()">Fullscreen</button>

</div>

<!-- VIEWER -->

<div class="viewer">

<div id="flow-wrapper">

<img id="flow-full"
src="assets/boilerfullflow.gif"
class="flow-img">

<img id="flow-water"
src="assets/boilerwaterandairflow.gif"
class="flow-img hidden">

<img id="flow-steam"
src="assets/boilersteamanddrain.gif"
class="flow-img hidden">

</div>

</div>

<script>

/* DISABLE RIGHT CLICK */

document.addEventListener("contextmenu", function(e){
e.preventDefault();
});


/* DISABLE IMAGE DRAG */

document.addEventListener("dragstart", function(e){
e.preventDefault();
});


/* PANZOOM */

const elem = document.getElementById('flow-wrapper');

const panzoom = Panzoom(elem,{
maxScale:6,
minScale:1,
step:0.3,
contain:'outside'
});


/* WHEEL ZOOM DESKTOP */

elem.parentElement.addEventListener('wheel', panzoom.zoomWithWheel);


/* DOUBLE TAP ZOOM MOBILE */

let lastTap = 0;

elem.addEventListener("touchend", function(event){

const currentTime = new Date().getTime();
const tapLength = currentTime - lastTap;

if(tapLength < 300 && tapLength > 0){
panzoom.zoomIn();
}

lastTap = currentTime;

});


/* RESET */

function resetZoom(){
panzoom.reset();
}


/* FULLSCREEN */

function toggleFullscreen(){

const viewer = document.querySelector(".viewer");

if(!document.fullscreenElement){
viewer.requestFullscreen();
}
else{
document.exitFullscreen();
}

}


/* FLOW SWITCH */

function showFlow(type,btn){

document.querySelectorAll(".flow-img").forEach(img=>{
img.classList.add("hidden");
});

document.querySelectorAll(".flow-tabs button").forEach(b=>{
b.classList.remove("active");
});

btn.classList.add("active");

if(type==="full"){
document.getElementById("flow-full").classList.remove("hidden");
}

if(type==="water"){
document.getElementById("flow-water").classList.remove("hidden");
}

if(type==="steam"){
document.getElementById("flow-steam").classList.remove("hidden");
}

resetZoom();

}

</script>

</body>
</html>
