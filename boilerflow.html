<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ABN Utilities | Boiler Process Flow</title>
    <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16x16.png">

    <script src="https://unpkg.com/@panzoom/panzoom/dist/panzoom.min.js"></script>

    <style>
        :root { --primary: #15803d; }

        body {
            margin: 0; padding: 0;
            font-family: sans-serif;
            background: #1a1a1a;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden; 
            -webkit-user-select: none; user-select: none;
        }

        .header {
            background: var(--primary);
            color: white;
            padding: 12px 15px;
            font-weight: bold;
            z-index: 20;
        }

        .flow-tabs {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
            gap: 8px;
            padding: 10px;
            background: white;
            z-index: 20;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        @media (max-width: 600px) {
            .flow-tabs { grid-template-columns: 1fr 1fr; }
        }

        .flow-tabs button {
            background: #eee; border: none;
            padding: 10px; border-radius: 8px;
            font-size: 13px; font-weight: bold;
            cursor: pointer;
        }

        .flow-tabs button.active {
            background: var(--primary); color: white;
        }

        /* VIEWER FIX */
       .viewer {
        flex-grow: 1;
        position: relative;
        overflow: hidden;
        touch-action: none;
        background: #1a1a1a;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    #flow-wrapper {
        /* Ginawa nating dynamic ang container size */
        width: 100vw; 
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .flow-img {
        /* Eto ang magic: Kakasya siya sa width ng phone mo by default */
        width: 100%; 
        height: auto;
        /* Pero hindi siya lalampas sa height ng screen */
        max-height: 85vh;
        display: block;
        pointer-events: none;
    }

        .hidden { display: none !important; }

        .controls {
            position: absolute;
            bottom: 25px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 30;
        }

        .btn-ctrl {
            width: 50px; height: 50px;
            border-radius: 50%; border: none;
            background: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            font-size: 20px;
            display: flex; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

    <div class="header">ABN Boiler Flow</div>

    <div class="flow-tabs">
        <button id="tab-full" class="active" onclick="showFlow('full', this)">⚙ Full Flow</button>
        <button id="tab-water" onclick="showFlow('water', this)">💧 Water/Air</button>
        <button id="tab-steam" onclick="showFlow('steam', this)">♨ Steam/Drain</button>
        <button id="tab-coal" onclick="showFlow('coalyard', this)">🏗 CoalYard</button>
    </div>

    <div class="viewer" id="viewer-area">
        <div id="flow-wrapper">
            <img id="flow-full" src="assets/boilerfullflow.gif" class="flow-img">
            <img id="flow-water" src="assets/boilerwaterandairflow.gif" class="flow-img hidden">
            <img id="flow-steam" src="assets/boilersteamanddrain.gif" class="flow-img hidden">
            <img id="flow-coalyard" src="assets/coalyard.drawio.svg" class="flow-img hidden">
        </div>

        <div class="controls">
            <button class="btn-ctrl" onclick="toggleFullscreen()">📺</button>
            <button class="btn-ctrl" onclick="resetView()">🏠</button>
            <button class="btn-ctrl" onclick="panzoom.zoomIn()">➕</button>
            <button class="btn-ctrl" onclick="panzoom.zoomOut()">➖</button>
        </div>
    </div>

    <script>
        const elem = document.getElementById('flow-wrapper');
    const viewerArea = document.getElementById('viewer-area');
    
    const panzoom = Panzoom(elem, {
        maxScale: 5,
        minScale: 1, // 1 para hindi na siya liliit pa sa "sakto sa screen"
        contain: 'outside', // Hahayaan kang mag-drag pag naka-zoom
        animate: true,
        // Start sa sakto lang (Scale 1)
        startScale: 1
    });

    // Importante: Recenter agad pagka-load
    setTimeout(() => {
        panzoom.pan(0, 0);
    }, 200);

    // DOUBLE TAP LOGIC (iOS/Android)
    let lastTap = 0;
    viewerArea.addEventListener('touchend', (e) => {
        const currentTime = new Date().getTime();
        const tapLength = currentTime - lastTap;
        if (tapLength < 300 && tapLength > 0) {
            e.preventDefault();
            const currentScale = panzoom.getScale();
            
            if (currentScale < 1.5) {
                // Zoom in sa gitna
                panzoom.zoom(2.5, { animate: true });
            } else {
                // Balik sa sakto sa screen
                panzoom.reset({ animate: true });
                setTimeout(() => panzoom.pan(0, 0), 300);
            }
        }
        lastTap = currentTime;
    });

    function showFlow(type, btn) {
        document.querySelectorAll(".flow-img").forEach(img => img.classList.add("hidden"));
        document.querySelectorAll(".flow-tabs button").forEach(b => b.classList.remove("active"));
        document.getElementById("flow-" + type).classList.remove("hidden");
        btn.classList.add("active");
        
        // Balik sa sakto sa screen paglipat ng diagram
        panzoom.reset();
        setTimeout(() => panzoom.pan(0, 0), 50);
    }

        function resetView() {
            panzoom.reset({ animate: true });
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {});
            } else {
                document.exitFullscreen();
            }
        }

        // Security
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && (e.key === 'p' || e.key === 's')) e.preventDefault();
        });
    </script>
</body>
</html>
