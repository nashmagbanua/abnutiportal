<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ABN Utilities | Boiler Process Flow</title>
    <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16x16.png">

    <script src="https://unpkg.com/@panzoom/panzoom/dist/panzoom.min.js"></script>

    <style>
        :root { --primary: #15803d; }

        body {
            margin: 0; padding: 0;
            font-family: sans-serif;
            background: #1a1a1a;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden; 
        }

        .header {
            background: var(--primary);
            color: white;
            padding: 12px 15px;
            font-weight: bold;
            z-index: 20;
        }

        .flow-tabs {
            display: flex;
            gap: 8px;
            padding: 10px;
            background: white;
            overflow-x: auto;
            border-bottom: 1px solid #ddd;
            z-index: 20;
            -webkit-overflow-scrolling: touch;
        }

        .flow-tabs button {
            background: #eee;
            border: none;
            padding: 10px 18px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
            white-space: nowrap;
            cursor: pointer;
        }

        .flow-tabs button.active {
            background: var(--primary);
            color: white;
        }

        .viewer {
            flex-grow: 1;
            position: relative;
            overflow: hidden;
            touch-action: none; 
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #flow-wrapper {
            width: 2500px; /* Mas pinalaki para mas malayo ang drag range */
            height: 1500px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .flow-img {
            width: 100%;
            height: auto;
            max-width: none;
            display: block;
            pointer-events: none;
            user-select: none;
        }

        .hidden { display: none !important; }

        .controls {
            position: absolute;
            bottom: 25px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 30;
        }

        .btn-ctrl {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            border: none;
            background: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            font-size: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>

    <div class="header">ABN Boiler Flow</div>

    <div class="flow-tabs">
        <button id="tab-full" class="active" onclick="showFlow('full', this)">⚙ Full</button>
        <button id="tab-water" onclick="showFlow('water', this)">💧 Water</button>
        <button id="tab-steam" onclick="showFlow('steam', this)">♨ Steam</button>
    </div>

    <div class="viewer" id="viewer-area">
        <div id="flow-wrapper">
            <img id="flow-full" src="assets/boilerfullflow.gif" class="flow-img">
            <img id="flow-water" src="assets/boilerwaterandairflow.gif" class="flow-img hidden">
            <img id="flow-steam" src="assets/boilersteamanddrain.gif" class="flow-img hidden">
        </div>

        <div class="controls">
            <button class="btn-ctrl" onclick="resetView()">🏠</button>
            <button class="btn-ctrl" onclick="panzoom.zoomIn()">➕</button>
            <button class="btn-ctrl" onclick="panzoom.zoomOut()">➖</button>
        </div>
    </div>

    <script>
        const elem = document.getElementById('flow-wrapper');
        const viewerArea = document.getElementById('viewer-area');
        
        const panzoom = Panzoom(elem, {
            maxScale: 5,
            minScale: 0.1,
            contain: 'outside',
            startScale: 0.4,
            animate: true
        });

        // Wheel zoom for Desktop/Chromebook
        viewerArea.addEventListener('wheel', panzoom.zoomWithWheel);

        // --- DOUBLE TAP LOGIC FOR MOBILE ---
        let lastTap = 0;
        viewerArea.addEventListener('touchend', (e) => {
            const currentTime = new Date().getTime();
            const tapLength = currentTime - lastTap;
            
            // Kung ang pagitan ng dalawang tap ay less than 300ms
            if (tapLength < 300 && tapLength > 0) {
                e.preventDefault(); // Iwasan ang default browser zoom
                
                const currentScale = panzoom.getScale();
                
                // Toggle Zoom: Pag maliit pa, i-zoom in. Pag malaki na, i-reset.
                if (currentScale < 1.5) {
                    panzoom.zoom(2.5, { animate: true });
                } else {
                    panzoom.reset({ animate: true });
                }
            }
            lastTap = currentTime;
        });

        function showFlow(type, btn) {
            document.querySelectorAll(".flow-img").forEach(img => img.classList.add("hidden"));
            document.querySelectorAll(".flow-tabs button").forEach(b => b.classList.remove("active"));
            
            document.getElementById("flow-" + type).classList.remove("hidden");
            btn.classList.add("active");
            
            // I-reset ang pwesto para nasa gitna ulit
            panzoom.reset();
        }

        function resetView() {
            panzoom.reset({ animate: true });
        }

        // Disable standard drags/context menus
        document.addEventListener('dragstart', (e) => e.preventDefault());
        document.addEventListener('contextmenu', (e) => e.preventDefault());
    </script>
</body>
</html>
