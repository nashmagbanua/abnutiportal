<!DOCTYPE html>
<html lang="tl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="apple-touch-icon" sizes="180x180" href="assets/abnlogo.svg">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/abnlogo.ico">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/abnlogo.ico">
    <title>Utilities Control Plan</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            display: flex;
            height: 100vh;
            background-color: #f4f6f9;
            color: #333;
            overflow: hidden;
        }

        /* Sidebar para sa Desktop */
        .sidebar {
            width: 280px;
            background-color: #1e293b;
            color: #fff;
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
            z-index: 10;
        }

        .sidebar-header {
            padding: 20px;
            background-color: #0f172a;
            font-size: 1.2rem;
            font-weight: bold;
            border-bottom: 1px solid #334155;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .menu-list {
            list-style: none;
            padding: 15px 0;
            overflow-y: auto;
            flex-grow: 1;
        }

        .menu-item {
            padding: 12px 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            transition: background 0.2s;
            font-size: 0.95rem;
            border-left: 4px solid transparent;
        }

        .menu-item:hover {
            background-color: #334155;
        }

        .menu-item.active {
            background-color: #0284c7;
            border-left: 4px solid #38bdf8;
            font-weight: bold;
        }

        /* Main Content Area */
        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            position: relative;
        }

        /* Mobile Header Navbar */
        .mobile-header {
            display: none;
            background-color: #1e293b;
            color: white;
            padding: 15px;
            justify-content: space-between;
            align-items: center;
        }

        .mobile-title {
            font-size: 1.1rem;
            font-weight: bold;
        }

        .hamburger {
            background: none;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
        }

        /* Iframe Container */
        .iframe-container {
            flex-grow: 1;
            width: 100%;
            height: 100%;
            border: none;
            background: #fff;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Mobile Responsiveness (Media Queries) */
        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }

            .mobile-header {
                display: flex;
            }

            .sidebar {
                position: absolute;
                left: -280px;
                top: 55px; /* base sa taas ng mobile header */
                height: calc(100vh - 55px);
                width: 280px;
            }

            .sidebar.open {
                left: 0;
            }

            .main-content {
                height: calc(100vh - 55px);
            }
        }
    </style>
</head>
<body>

    <div class="mobile-header" style="display: flex; align-items: center; padding: 10px 15px; background-color: #1e293b; color: white;">
    <button class="hamburger" onclick="toggleSidebar()" style="background: none; border: none; color: white; font-size: 1.5rem; cursor: pointer; margin-right: 12px;">☰</button>
    
    <div style="display: flex; align-items: center; gap: 8px;">
        <img src="assets/abnlogo.svg" alt="ABN Logo" style="width: 25px; height: 25px; object-fit: contain;">
        <div class="mobile-title" id="mobile-page-title" style="font-size: 1.1rem; font-weight: bold;">WWTP PCP</div>
    </div>
    
    <a href="login.html" style="color: #ef4444; font-size: 1.2rem; margin-left: auto; padding-right: 5px;">
        <i class="fas fa-sign-out-alt"></i>
    </a>
</div>
    
    <div class="sidebar-header" style="display: flex; justify-content: space-between; align-items: center; padding: 15px 20px;">
    <div style="display: flex; align-items: center; gap: 10px;">
        <img src="assets/abnlogo.svg" alt="ABN Logo" style="width: 30px; height: 30px; object-fit: contain;">
        <span>ABN Utilities</span>
    </div>
    <a href="login.html" title="Logout" style="color: #ef4444; font-size: 1.2rem; transition: transform 0.2s;" onmouseover="this.style.transform='scale(1.15)'" onmouseout="this.style.transform='scale(1)'">
        <i class="fas fa-sign-out-alt"></i>
    </a>
</div>
        
        <ul class="menu-list">
            <li class="menu-item active" onclick="loadPage('controlplan/WWTP_PCP.html', 'WWTP', this)">WWTP PCP</li>
            <li class="menu-item" onclick="loadPage('controlplan/TowerWaterPCP.html', 'Tower Water', this)">Tower Water PCP</li>
            <li class="menu-item" onclick="loadPage('controlplan/TankFarmGlycolCPPCPp2.html', 'Tank Farm Glycol', this)">Tank Farm Glycol CP PCP p2</li>
            <li class="menu-item" onclick="loadPage('controlplan/SteamGenerationCFPCPp1 .html', 'Steam Gen Coal-Fired', this)">Steam Gen CF PCP p1</li>
            <li class="menu-item" onclick="loadPage('controlplan/R.O.WaterPCPp1.html', 'R.O. Water', this)">R.O. Water PCP</li>
            <li class="menu-item" onclick="loadPage('controlplan/ProcessedWaterPCPp1.html', 'Processed Water', this)">Processed Water PCP</li>
            <li class="menu-item" onclick="loadPage('controlplan/ProcessedChilledWaterPCPa.html', 'Chilled Water', this)">Processed Chilled Water PCPa</li>
            <li class="menu-item" onclick="loadPage('controlplan/PlantWaterPCPa.html', 'Plant Water', this)">Plant Water PCPa</li>
            <li class="menu-item" onclick="loadPage('controlplan/CompressedAirPCPp1.html', 'Compressed Air', this)">Compressed Air PCP</li>
            <li class="menu-item" onclick="loadPage('controlplan/CleanSteamGeneration.html', 'Clean Steam', this)">Clean Steam Generation</li>
        </ul>
    </div>

    <div class="main-content">
        <div class="iframe-container">
            <iframe id="content-frame" src="controlplan/WWTP_PCP.html"></iframe>
        </div>
    </div>

    <script>
        // Function para magpalit ng ipinapakitang HTML file sa iframe
        function loadPage(url, title, element) {
            document.getElementById('content-frame').src = url;
            document.getElementById('mobile-page-title').innerText = title;

            const menuItems = document.querySelectorAll('.menu-item');
            menuItems.forEach(item => item.classList.remove('active'));
            element.classList.add('active');

            if (window.innerWidth <= 768) {
                document.getElementById('sidebar').classList.remove('open');
            }
        }

        // Function para sa pagbukas/pagsara ng menu sa cellphone
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('open');
        }
    </script>
</body>
</html>
